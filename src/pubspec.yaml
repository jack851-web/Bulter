name: bulter
description: "Bulter - AI 人生管家。本地优先、越用越懂用户的个人 Agent 工具。"
publish_to: 'none'
version: 0.5.0+7

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 路由
  go_router: ^14.2.7

  # 不可变数据模型
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 本地存储
  drift: ^2.20.3
  sqlite3: ^2.4.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # sqlite-vec (本地 FFI 插件，vendoring 源码避免外部 alpha 包的打包缺陷)
  bulter_sqlite_vec:
    path: plugins/bulter_sqlite_vec

  # 网络
  dio: ^5.7.0

  # UI
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1

  # 工具
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 代码生成
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  drift_dev: ^2.20.3

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/svg/
    - assets/svg/common/
    - assets/svg/modules/
    - assets/svg/chat/
    - assets/svg/settings/
